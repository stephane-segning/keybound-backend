openapi: 3.1.0
info:
  title: KYC Staff Flow API
  version: 1.0.1
  description: Staff-only v2 flow operations for admin-managed steps.

servers:
  - url: "https://api.example.com"

security:
  - BearerAuth: [ ]

tags:
  - name: staff-flow
    description: Observe and operate on admin-managed flow steps.

paths:
  /flow/steps:
    get:
      operationId: staffFlowListSteps
      tags: [ staff-flow ]
      summary: List admin-managed flow steps
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: flowType
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Matching admin steps

  /flow/steps/{stepId}:
    get:
      operationId: staffFlowGetStep
      tags: [ staff-flow ]
      summary: Get an admin-managed flow step
      parameters:
        - $ref: "#/components/parameters/StepId"
      responses:
        "200":
          description: Step detail
    post:
      operationId: staffFlowSubmitStep
      tags: [ staff-flow ]
      summary: Submit admin input for a flow step
      parameters:
        - $ref: "#/components/parameters/StepId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Step updated

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        type: string
