openapi: 3.1.0
info:
  title: Customer Registration Staff Review API
  version: 1.0.0
  description: KYC review endpoints available only to staff reviewers.
servers:
  - url: 'https://api.example.com'
    description: Example production server
tags:
  - name: KYC Review
    description: Endpoints for review staff to operate on KYC submissions.
security:
  - BearerAuth: []
paths:
  /api/kyc/staff/submissions:
    get:
      tags:
        - KYC Review
      summary: List submissions
      description: Return paginated KYC submissions filtered by status or search text, so reviewers can scan pending/processed work with optional filters.
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: 'Optional status filter (pending, approved, rejected).'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional text to search across names and emails.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Page of KYC submissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSubmissionsResponse'
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}':
    get:
      tags:
        - KYC Review
      summary: Get submission
      description: Return detailed submission for a single customer, including the latest state and evidence list to support review decisions.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Detailed submission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSubmissionDetailResponse'
        '401':
          description: Unauthorized.
        '404':
          description: Submission not found.
  '/api/kyc/staff/submissions/{userId}/approve':
    post:
      tags:
        - KYC Review
      summary: Approve KYC
      description: Records an approval ticket for the user and optionally triggers downstream tier migration.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycApprovalRequest'
      responses:
        '200':
          description: KYC approved.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/reject':
    post:
      tags:
        - KYC Review
      summary: Reject KYC
      description: Logs a rejection reason and notes, maintaining the rejection history for compliance.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycRejectionRequest'
      responses:
        '200':
          description: KYC rejected.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/request-info':
    post:
      tags:
        - KYC Review
      summary: Request more info
      description: Sends a request for additional customer data so the user can complete missing evidence.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycRequestInfoRequest'
      responses:
        '200':
          description: Additional info requested.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/documents/{documentId}/download-url':
    post:
      tags:
        - KYC Review
      summary: Get presigned download URL for a document
      description: Returns a short-lived presigned URL to download a document from S3 so staff tooling can download stored evidence securely.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: Document ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedDownloadUrlRequest'
      responses:
        '200':
          description: Presigned download URL created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedDownloadUrlResponse'
        '401':
          description: Unauthorized.
        '404':
          description: Submission or document not found.
        '410':
          description: Document no longer available (e.g., deleted or expired).
        '429':
          description: Too many requests.

  /staff/review/queue:
    get:
      tags:
        - KYC Review
      summary: Get pending review queue
      description: Produces a paginated queue view of pending review cases so reviewers can claim cases based on oldest submissions.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        "200":
          description: Paginated list of cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueResponse"

  /staff/review/cases/{caseId}:
    get:
      tags:
        - KYC Review
      summary: Get a single review case (includes evidence refs)
      security:
        - BearerAuth: []
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
          description: Case ID.
      description: Fetches a case record with its evidence references so the reviewer can inspect all attachments.
      responses:
        "200":
          description: Case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewCase"

  /staff/review/cases/{caseId}/decision:
    post:
      tags:
        - KYC Review
      summary: Approve or reject a case
      security:
        - BearerAuth: []
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: string
          description: Case ID.
      description: Persists the reviewer's decision and reason, updating the case status and notifying downstream systems.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecision"
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewDecisionResult"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number (default 1).
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
      description: Page size (default 20).
  schemas:
    KycSubmissionsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/KycSubmissionSummary'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    KycSubmissionSummary:
      type: object
      properties:
        userId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        kycTier:
          type: integer
        kycStatus:
          $ref: '#/components/schemas/KycStatus'
        submittedAt:
          type: string
    KycSubmissionDetailResponse:
      type: object
      properties:
        userId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfBirth:
          type: string
        nationality:
          type: string
        kycTier:
          type: integer
        kycStatus:
          $ref: '#/components/schemas/KycStatus'
        documents:
          type: array
          items:
            $ref: '#/components/schemas/KycDocumentDto'
        submittedAt:
          type: string
        reviewedAt:
          type: string
        reviewedBy:
          type: string
        rejectionReason:
          type: string
        reviewNotes:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        totalDocuments:
          type: integer
    KycDocumentDto:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
    KycApprovalRequest:
      type: object
      required:
        - newTier
      properties:
        newTier:
          type: integer
          minimum: 1
          maximum: 3
        notes:
          type: string
    KycRejectionRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          maxLength: 100
        notes:
          type: string
          maxLength: 500
    KycRequestInfoRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          maxLength: 500
    PresignedDownloadUrlRequest:
      type: object
      properties:
        expiresInSeconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 300
          description: URL TTL in seconds (default 300, max 3600).
        responseContentDisposition:
          type: string
          description: >
            Optional content disposition override (e.g. "attachment; filename=\"id-front.jpg\"").

    PresignedDownloadUrlResponse:
      type: object
      required:
        - url
        - expiresAt
      properties:
        url:
          type: string
          format: uri
          description: Presigned S3 URL for downloading the document.
        expiresAt:
          type: string
          format: date-time
          description: Absolute expiration timestamp for the URL.
        documentId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required: [ page, pageSize, total ]
    ReviewQueueResponse:
      type: object
      additionalProperties: false
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewCase'
      required: [ pagination, items ]
    ReviewCase:
      type: object
      additionalProperties: false
      properties:
        caseId: { type: string }
        userId: { type: string }
        stepId: { type: string }
        status:
          $ref: '#/components/schemas/KycStatus'
        submittedAt: { type: string, format: date-time }
        fullName:
          type: object
          additionalProperties: false
          properties:
            firstName: { type: string }
            middleName: { type: string }
            lastName: { type: string }
          required: [ firstName, lastName ]
        evidence:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              assetType:
                $ref: '#/components/schemas/IdentityAssetType'
              evidenceId: { type: string }
            required: [ assetType, evidenceId ]
      required: [ caseId, userId, stepId, status, submittedAt, fullName, evidence ]
    ReviewDecision:
      type: object
      additionalProperties: false
      properties:
        decision:
          $ref: '#/components/schemas/ReviewDecisionOutcome'
        reasonCode:
          $ref: '#/components/schemas/ReviewReasonCode'
        comment: { type: string, maxLength: 500 }
      required: [ decision, reasonCode ]
    ReviewDecisionResult:
      type: object
      additionalProperties: false
      properties:
        caseId: { type: string }
        decision:
          $ref: '#/components/schemas/ReviewDecisionOutcome'
        decidedAt: { type: string, format: date-time }
      required: [ caseId, decision, decidedAt ]
    IdentityAssetType:
      type: string
      enum:
        - SELFIE_CLOSEUP
        - SELFIE_WITH_ID
        - ID_FRONT
        - ID_BACK
    ReviewDecisionOutcome:
      type: string
      enum:
        - APPROVE
        - REJECT
    ReviewReasonCode:
      type: string
      enum:
        - OK
        - BLURRY
        - MISSING_FACE
        - ID_NOT_READABLE
        - ID_MISMATCH
        - FRAUD_SUSPECTED
        - OTHER
    KycStatus:
      type: string
      enum:
        - NOT_STARTED
        - IN_PROGRESS
        - CAPTURED
        - PENDING_REVIEW
        - VERIFIED
        - REJECTED
        - FAILED
