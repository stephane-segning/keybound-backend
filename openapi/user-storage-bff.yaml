openapi: 3.0.3
info:
  title: Customer Registration Core API
  version: 1.1.0
  description: >
    Core KYC + limits API consumed by a customer-facing BFF. Identity handled by Keycloak (JWT).
servers:
  - url: https://api.example.com
    description: Example production server

tags:
  - name: KYC
    description: KYC case/submission and documents.
  - name: Limits
    description: Transaction limits derived from KYC tier.

paths:
  /api/limits:
    get:
      tags: [ Limits ]
      summary: Get transaction limits
      description: Retrieve deposit/withdrawal limits based on current KYC tier and usage.
      security: [ { bearerAuth: [ ] } ]
      responses:
        '200':
          description: Limits and usage details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LimitsResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/registration/kyc/profile:
    patch:
      tags: [ KYC ]
      operationId: apiRegistrationKycProfilePatch
      summary: Partially update my KYC profile using JSON Patch
      description: >
        Applies RFC 6902 JSON Patch operations against the authenticated user's KYC profile.
        Supports nested field updates.
      security: [ { bearerAuth: [ ] } ]
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/JsonPatchOperation'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KycCaseResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '412': { $ref: '#/components/responses/PreconditionFailed' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        pattern: '^sub_[a-z0-9]{10,}$'
      description: Submission ID (prefixed CUID).

    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        pattern: '^doc_[a-z0-9]{10,}$'
      description: Document ID (prefixed CUID).

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Idempotency key for safe retries.

  responses:
    BadRequest:
      description: Bad request / validation error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Unauthorized.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: Not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Conflict:
      description: Conflict / illegal state transition / duplicate.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    PreconditionFailed:
      description: ETag mismatch (optimistic concurrency failure).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    JsonPatchOperation:
      type: object
      additionalProperties: false
      required: [ op, path ]
      properties:
        op:
          type: string
          enum: [ add, remove, replace, move, copy, test ]
        path:
          type: string
          minLength: 1
        from:
          type: string
        value:
          nullable: true

    KycCaseStatus:
      type: string
      enum: [ OPEN, CLOSED ]

    KycProvisioningStatus:
      type: string
      enum: [ NONE, STARTED, SUCCEEDED, FAILED ]

    KycNextAction:
      type: string
      enum: [ UPLOAD_DOCUMENTS, FIX_PROFILE, WAIT, CONTACT_SUPPORT ]
      description: UI helper derived from status.

    KycDocumentType:
      type: string
      enum: [ ID_FRONT, ID_BACK, SELFIE, PROOF_OF_ADDRESS ]

    KycDocumentStatus:
      type: string
      enum: [ INITIATED, UPLOADED, VERIFIED, REJECTED ]

    KycCaseResponse:
      type: object
      required: [ caseId, caseStatus, activeSubmission ]
      properties:
        caseId:
          type: string
          pattern: '^kyc_[a-z0-9]{10,}$'
        caseStatus:
          $ref: '#/components/schemas/KycCaseStatus'
        currentTier:
          type: integer
          minimum: 0
          maximum: 3
        activeSubmission:
          $ref: '#/components/schemas/KycSubmissionSummary'

    KycSubmissionSummary:
      type: object
      required: [ submissionId, version, status ]
      properties:
        submissionId:
          type: string
          pattern: '^sub_[a-z0-9]{10,}$'
        version:
          type: integer
          minimum: 1
        status:
          $ref: '#/components/schemas/KycSubmissionStatus'
        requestedTier:
          type: integer
          minimum: 1
          maximum: 3
        decidedTier:
          type: integer
          minimum: 1
          maximum: 3
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        provisioningStatus:
          $ref: '#/components/schemas/KycProvisioningStatus'
        nextAction:
          $ref: '#/components/schemas/KycNextAction'


    KycSubmissionStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - IN_VERIFICATION
        - RISK_ASSESSMENT
        - PENDING_MANUAL_REVIEW
        - PENDING_USER_RESPONSE
        - APPROVED
        - REJECTED

    KycProfilePatchRequest:
      type: object
      additionalProperties: false
      properties:
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        email: { type: string, format: email }
        phoneNumber: { type: string, maxLength: 64 }
        dateOfBirth: { type: string, format: date }
        nationality: { type: string, maxLength: 2, description: "ISO 3166-1 alpha-2" }
        address: { $ref: '#/components/schemas/KycAddress' }

    OpenSubmissionRequest:
      type: object
      additionalProperties: false
      properties:
        requestedTier:
          type: integer
          minimum: 1
          maximum: 3

    KycSubmissionDetailResponse:
      type: object
      required: [ submissionId, version, status, userProfile, documents ]
      properties:
        submissionId:
          type: string
          pattern: '^sub_[a-z0-9]{10,}$'
        version:
          type: integer
        status:
          $ref: '#/components/schemas/KycSubmissionStatus'
        userProfile:
          $ref: '#/components/schemas/UserProfile'
        documents:
          type: array
          items: { $ref: '#/components/schemas/KycDocument' }
        staffMessages:
          type: array
          description: Messages visible to the customer (e.g. request-info).
          items: { $ref: '#/components/schemas/StaffMessage' }

    UserProfile:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        phoneNumber: { type: string }
        dateOfBirth: { type: string, format: date }
        nationality: { type: string }
        address: { $ref: '#/components/schemas/KycAddress' }

    KycAddress:
      type: object
      additionalProperties: false
      properties:
        gps:
          type: object
          additionalProperties: false
          properties:
            lat: { type: number, minimum: -90, maximum: 90 }
            lon: { type: number, minimum: -180, maximum: 180 }
        street: { type: string }
        city: { type: string }
        postalCode: { type: string }
        country:
          type: string
          description: "ISO 3166-1 alpha-2"
          minLength: 2
          maxLength: 2

    KycDocument:
      type: object
      required: [ documentId, documentType, fileName, status, uploadedAt ]
      properties:
        documentId:
          type: string
          pattern: '^doc_[a-z0-9]{10,}$'
        fileName: { type: string }
        documentType:
          $ref: '#/components/schemas/KycDocumentType'
        status:
          $ref: '#/components/schemas/KycDocumentStatus'
        uploadedAt:
          type: string
          format: date-time
          nullable: true

    InitDocumentUploadRequest:
      type: object
      required: [ documentType, fileName, mimeType ]
      additionalProperties: false
      properties:
        documentType:
          $ref: '#/components/schemas/KycDocumentType'
        fileName:
          type: string
          maxLength: 256
        mimeType:
          type: string
          maxLength: 128
        sizeBytes:
          type: integer
          minimum: 1
          nullable: true

    InitDocumentUploadResponse:
      type: object
      required: [ documentId, uploadUrl, expiresAt ]
      properties:
        documentId:
          type: string
          pattern: '^doc_[a-z0-9]{10,}$'
        uploadUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: Optional headers the client must include in the PUT to S3.

    ConfirmDocumentUploadRequest:
      type: object
      required: [ sha256, sizeBytes ]
      additionalProperties: false
      properties:
        sha256:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
        sizeBytes:
          type: integer
          minimum: 1

    StaffMessage:
      type: object
      required: [ messageId, message, createdAt ]
      properties:
        messageId:
          type: string
        message:
          type: string
          maxLength: 500
        createdAt:
          type: string
          format: date-time

    LimitsResponse:
      type: object
      properties:
        kycTier: { type: integer }
        tierName: { type: string }
        currency: { type: string }
        effectiveAt:
          type: string
          format: date-time
        limits: { $ref: '#/components/schemas/LimitsResponseLimitsDto' }
        usage: { $ref: '#/components/schemas/LimitsResponseUsageDto' }
        available: { $ref: '#/components/schemas/LimitsResponseAvailableDto' }
        allowedPaymentMethods:
          type: array
          items: { type: string }
        restrictedFeatures:
          type: array
          items: { type: string }

    LimitsResponseLimitsDto:
      type: object
      properties:
        dailyDepositLimit: { type: number }
        dailyWithdrawalLimit: { type: number }
        perTransactionLimit: { type: number }
        monthlyTransactionLimit: { type: number }

    LimitsResponseUsageDto:
      type: object
      properties:
        dailyDepositUsed: { type: number }
        dailyWithdrawalUsed: { type: number }
        monthlyUsed: { type: number }

    LimitsResponseAvailableDto:
      type: object
      properties:
        depositRemaining: { type: number }
        withdrawalRemaining: { type: number }

    ProblemDetails:
      type: object
      required: [ title, status ]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code:
          type: string
          description: Application-specific error code (e.g., KYC_INVALID_STATE).
        traceId:
          type: string
        errors:
          type: array
          items:
            type: object
            required: [ field, message ]
            properties:
              field: { type: string }
              message: { type: string }
