openapi: 3.1.0
info:
  title: KYC Backend Internal API
  version: 0.1.2
  description: >
    Internal API for KYC orchestration, evidence storage metadata, OTP/email issuance, and staff review operations. Intended for trusted callers only (BFF, staff console, jobs).
servers:
- url: https://kyc-internal.example.local
tags:
- name: steps
- name: uploads
- name: notifications
- name: staff

security:
- BearerAuth: []

paths:
  /internal/kyc/sessions:
    post:
      tags: [ steps ]
      summary: Create/resume session for a user
      description: Allocates or refreshes a backend session tied to a user ID, ensuring steps are tracked consistently.
      operationId: internalStartSession
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalStartSessionRequest"
      responses:
        "201":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycSessionInternal"

  /internal/kyc/steps:
    post:
      tags: [ steps ]
      summary: Create a KYC step
      description: Adds a new verification step (phone, email, address, or identity) to the ongoing session and returns its metadata.
      operationId: internalCreateStep
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStepRequest"
      responses:
        "201":
          description: Step created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStepInternal"

  /internal/kyc/steps/{stepId}:
    get:
      tags: [ steps ]
      summary: Get step
      description: Retrieves the internal state, data payload, and policy of the specified step for orchestration or staff tooling.
      operationId: internalGetStep
      security:
      - BearerAuth: []
      parameters:
      - $ref: "#/components/parameters/StepId"
      responses:
        "200":
          description: Step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStepInternal"

  /internal/kyc/phone/otp/issue:
    post:
      tags: [ notifications ]
      summary: Issue OTP
      description: Requests the underlying SMS gateway to issue a one-time code for the given msisdn and step.
      operationId: internalIssueOtp
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueOtpRequest"
      responses:
        "200":
          description: Challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpChallengeInternal"

  /internal/kyc/phone/otp/verify:
    post:
      tags: [ notifications ]
      summary: Verify OTP
      description: Confirms the submitted OTP against the stored challenge, returning the verification outcome and updated step status.
      operationId: internalVerifyOtp
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInternalRequest"
      responses:
        "200":
          description: Verification outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOutcome"

  /internal/kyc/email/magic/issue:
    post:
      tags: [ notifications ]
      summary: Issue magic email token
      description: Generates a magic email token tied to a step so the client can deliver a secure link or code to the user.
      operationId: internalIssueMagicEmail
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueMagicEmailRequest"
      responses:
        "200":
          description: Challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicEmailChallengeInternal"

  /internal/kyc/email/magic/verify:
    post:
      tags: [ notifications ]
      summary: Verify magic token
      description: Validates the email token and surfaces the result (verified/invalid/expired) along with the current step status.
      operationId: internalVerifyMagicEmail
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMagicEmailRequest"
      responses:
        "200":
          description: Outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyOutcome"

  /internal/uploads/presign:
    post:
      tags: [ uploads ]
      summary: Create presigned upload (S3-compatible)
      description: Provides presigned upload details (single/multipart) and encryption policy for evidence ingestion.
      operationId: internalPresignUpload
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalPresignRequest"
      responses:
        "200":
          description: Presign response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignUploadResponseInternal"

  /internal/uploads/complete:
    post:
      tags: [ uploads ]
      summary: Finalize upload and register evidence
      description: Closes the upload session, optionally verifies checksum, and registers evidence metadata with the step.
      operationId: internalCompleteUpload
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalCompleteUploadRequest"
      responses:
        "200":
          description: Evidence registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceRef"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Generic bearer token used by services and staff consoles.

  parameters:
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/StepIdValue"
    Page:
      name: page
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/PageNumber"
      description: Page number (default 1).
    Limit:
      name: limit
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/PageSize"
      description: Page size (default 20).

  schemas:
    KycStatus:
      type: string
      enum:
      - NOT_STARTED
      - IN_PROGRESS
      - CAPTURED
      - PENDING_REVIEW
      - VERIFIED
      - REJECTED
      - FAILED

    StepType:
      type: string
      enum:
      - PHONE
      - EMAIL
      - ADDRESS
      - IDENTITY

    StepIdValue:
      type: string
      minLength: 8

    PageNumber:
      type: integer
      default: 1
      minimum: 1

    PageSize:
      type: integer
      default: 20
      minimum: 1

    KycSessionInternalStatus:
      type: string
      enum:
      - OPEN
      - COMPLETED
      - LOCKED

    KycSessionInternal:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        userId: { type: string }
        status: { $ref: "#/components/schemas/KycSessionInternalStatus" }
        stepIds:
          type: array
          items: { type: string }
        updatedAt: { type: string, format: date-time }
      required: [ id, userId, status, stepIds, updatedAt ]

    InternalStartSessionRequest:
      type: object
      additionalProperties: false
      properties:
        userId: { type: string }
        reason: { type: string }
      required: [ userId ]

    CreateStepRequest:
      type: object
      additionalProperties: false
      properties:
        sessionId: { type: string }
        userId: { type: string }
        type: { $ref: "#/components/schemas/StepType" }
        policy:
          type: object
          additionalProperties: true
      required: [ sessionId, userId, type ]

    KycStepInternal:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        sessionId: { type: string }
        userId: { type: string }
        type: { $ref: "#/components/schemas/StepType" }
        status: { $ref: "#/components/schemas/KycStatus" }
        data:
          type: object
          description: Internal step data (may include PII/evidence refs).
          additionalProperties: true
        policy:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [ id, sessionId, userId, type, status, createdAt, updatedAt ]

    IssueOtpRequestChannel:
      type: string
      enum:
      - SMS
      - VOICE
    IssueOtpRequest:
      type: object
      additionalProperties: false
      properties:
        stepId: { type: string }
        msisdn: { type: string, example: "+237690000000" }
        channel: { $ref: "#/components/schemas/IssueOtpRequestChannel" }
        ttlSeconds: { type: integer, minimum: 30, maximum: 900 }
      required: [ stepId, msisdn ]

    OtpChallengeInternal:
      type: object
      additionalProperties: false
      properties:
        otpRef: { type: string }
        providerMessageId:
          type: string
          description: Optional provider id from SMS gateway
        expiresAt: { type: string, format: date-time }
        triesLeft: { type: integer, minimum: 0 }
      required: [ otpRef, expiresAt, triesLeft ]

    VerifyOtpInternalRequest:
      type: object
      additionalProperties: false
      properties:
        stepId: { type: string }
        otpRef: { type: string }
        code: { type: string, minLength: 4, maxLength: 8 }
      required: [ stepId, otpRef, code ]

    IssueMagicEmailRequest:
      type: object
      additionalProperties: false
      properties:
        stepId: { type: string }
        email: { type: string, format: email }
        ttlSeconds: { type: integer, minimum: 60, maximum: 86400 }
        includeShortCode: { type: boolean, default: true }
      required: [ stepId, email ]

    MagicEmailChallengeInternal:
      type: object
      additionalProperties: false
      properties:
        tokenRef: { type: string }
        expiresAt: { type: string, format: date-time }
      required: [ tokenRef, expiresAt ]

    VerifyMagicEmailRequest:
      type: object
      additionalProperties: false
      properties:
        token: { type: string, minLength: 10 }
      required: [ token ]

    VerifyOutcomeReason:
      type: string
      enum:
      - VERIFIED
      - INVALID
      - EXPIRED
      - LOCKED
      - RATE_LIMITED

    VerifyOutcome:
      type: object
      additionalProperties: false
      properties:
        ok: { type: boolean }
        reason: { $ref: "#/components/schemas/VerifyOutcomeReason" }
        stepStatus: { $ref: "#/components/schemas/KycStatus" }
      required: [ ok, reason, stepStatus ]

    InternalPresignRequest:
      type: object
      additionalProperties: false
      properties:
        stepId: { type: string }
        userId: { type: string }
        purpose:
          $ref: "#/components/schemas/InternalUploadPurpose"
        assetType:
          $ref: "#/components/schemas/IdentityAssetType"
        mime: { type: string }
        sizeBytes: { type: integer, minimum: 1 }
        encryption:
          type: object
          additionalProperties: false
          properties:
            mode:
              $ref: "#/components/schemas/SseMode"
          required: [ mode ]
      required: [ stepId, userId, purpose, assetType, mime, sizeBytes ]

    PresignUploadResponseInternal:
      type: object
      additionalProperties: false
      properties:
        uploadId: { type: string }
        bucket: { type: string }
        objectKey: { type: string }
        method:
          $ref: "#/components/schemas/UploadMethod"
        url: { type: string }
        headers:
          type: object
          additionalProperties: { type: string }
        multipart:
          type: object
          additionalProperties: false
          properties:
            uploadKey: { type: string }
            partSizeBytes: { type: integer }
            parts:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  partNumber: { type: integer, minimum: 1 }
                  url: { type: string }
                required: [ partNumber, url ]
          required: [ partSizeBytes, parts ]
        expiresAt: { type: string, format: date-time }
      required: [ uploadId, bucket, objectKey, method, expiresAt ]

    InternalCompleteUploadRequest:
      type: object
      additionalProperties: false
      properties:
        uploadId: { type: string }
        bucket: { type: string }
        objectKey: { type: string }
        etag: { type: string }
        parts:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              partNumber: { type: integer, minimum: 1 }
              etag: { type: string }
            required: [ partNumber, etag ]
        computedSha256: { type: string }
      required: [ uploadId, bucket, objectKey ]

    EvidenceRef:
      type: object
      additionalProperties: false
      properties:
        evidenceId: { type: string }
        stepId: { type: string }
        assetType: { type: string }
        sha256: { type: string }
        createdAt: { type: string, format: date-time }
      required: [ evidenceId, stepId, assetType, createdAt ]

    IdentityAssetType:
      type: string
      enum:
      - SELFIE_CLOSEUP
      - SELFIE_WITH_ID
      - ID_FRONT
      - ID_BACK

    InternalUploadPurpose:
      type: string
      enum:
      - KYC_IDENTITY

    SseMode:
      type: string
      enum:
      - SSE_S3
      - SSE_KMS
      - SSE_C

    UploadMethod:
      type: string
      enum:
      - PUT

    ReviewDecisionOutcome:
      type: string
      enum:
      - APPROVE
      - REJECT

    ReviewReasonCode:
      type: string
      enum:
      - OK
      - BLURRY
      - MISSING_FACE
      - ID_NOT_READABLE
      - ID_MISMATCH
      - FRAUD_SUSPECTED
      - OTHER
