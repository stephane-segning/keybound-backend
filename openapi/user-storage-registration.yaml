openapi: 3.0.3
info:
  title: Customer Registration Service - Register
  version: 1.0.0
  description: Public registration endpoint for new customers.
servers:
  - url: 'https://api.example.com'
    description: Example production server
tags:
  - name: Registration
    description: Customer self-registration operations.
paths:
  /api/registration/register:
    post:
      tags:
        - Registration
      summary: Register a new customer
      description: Creates Fineract client and Keycloak user for self-service customer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Registration successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
        '400':
          description: Validation error or email already exists.
        '500':
          description: Registration failed.
components:
  schemas:
    RegistrationRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          description: Phone number must follow E.164 pattern.
        nationalId:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        address:
          $ref: '#/components/schemas/RegistrationRequestAddressDto'
    RegistrationRequestAddressDto:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          type: string
    RegistrationResponse:
      type: object
      properties:
        externalId:
          type: string
        status:
          type: string
        message:
          type: string
        nextSteps:
          type: array
          items:
            type: string
