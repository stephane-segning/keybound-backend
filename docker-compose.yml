services:
  download-core-tools:
    image: alpine/curl
    environment:
      KEYCLOAK_PLUGIN_VERSION: "0.2.3"
      OPENAPI_GENERATOR_VERSION: "7.19.0"
    command:
    - /bin/sh
    - -c
    - |
      set -ex;
      rm -rf /data/*
      mkdir -p /data/bin
      mkdir -p /data/kc-plugins

      download() {
        output="$$1"
        url="$$2"
        curl -fL \
          --retry 8 \
          --retry-delay 2 \
          --retry-all-errors \
          --connect-timeout 10 \
          --max-time 300 \
          -o "$$output" "$$url"
      }

      echo "Download OpenAPI generator (we're using it to generate code from OpenAPI specs...";
      download /data/bin/openapi-generator-cli.jar "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/$$OPENAPI_GENERATOR_VERSION/openapi-generator-cli-$$OPENAPI_GENERATOR_VERSION.jar"

      echo "Download OpenAPI for Keycloak...";
      download /data/keycloak-interface.openapi.yaml "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/backend.open-api.yml"
      echo "Downloaded OpenAPI for Keycloak";

      echo "Download keybound...";
      download /data/kc-plugins/keycloak-keybound-all.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-all-$$KEYCLOAK_PLUGIN_VERSION-all.jar"
      download /data/kc-plugins/keycloak-keybound-api-gateway-http.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-api-gateway-http-$$KEYCLOAK_PLUGIN_VERSION.jar"
      download /data/kc-plugins/keycloak-keybound-custom-endpoint.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-custom-endpoint-$$KEYCLOAK_PLUGIN_VERSION.jar"
      download /data/kc-plugins/keycloak-keybound-grant-device-key.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-grant-device-key-$$KEYCLOAK_PLUGIN_VERSION.jar"
      download /data/kc-plugins/keycloak-keybound-user-storage-backend.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-user-storage-backend-$$KEYCLOAK_PLUGIN_VERSION.jar"
      echo "Downloaded keybound";

    volumes:
    - ./.docker/downloaded:/data


  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user-storage
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-user-storage-dev}
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
        echo "waiting for minio...";
        sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing local/$${MINIO_BUCKET};
      '

  cuss-wiremock:
    image: wiremock/wiremock:3.13.1
    container_name: upstream-mock
    command:
      - --verbose
    ports:
      - "8084:8080"
    volumes:
      - ./config/e2eTest/resources/wiremock:/home/wiremock:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://cuss-wiremock:8080/__admin/mappings >/dev/null 2>&1" ]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    ports:
      - "9026:9026"
    environment:
      KC_HTTP_PORT: 9026
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/user-storage
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      # Dev-only credentials. Do not reuse in production.
      BACKEND_HTTP_BASE_PATH_e2e-testing: "http://user-storage:3000/kc"
      BACKEND_HTTP_SIGNATURE_SECRET_e2e-testing: "some-very-long-secret"
      BACKEND_HTTP_SIGNATURE_VERSION_e2e-testing: "1"
      BACKEND_HTTP_TELEMETRY_ENABLED_e2e-testing: "true"
      BACKEND_HTTP_ACTOR_e2e-testing: "keycloak-u-e2e-testing"
      BACKEND_HTTP_AUTH_USERNAME: "admin"
      BACKEND_HTTP_AUTH_PASSWORD: "password"
      NONCE_CACHE_TTL_e2e-testing: "60"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
    # Native entrypoint (kc.sh) will handle the command
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/localhost/9026 && echo -e 'GET /realms/e2e-testing HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
      - --metrics-enabled=true
      - --log-level=info
    volumes:
      - ./.docker/keycloak-config/realm.e2e.json:/opt/keycloak/data/import/realm.json:ro
      - ./.docker/downloaded/kc-plugins:/opt/keycloak/providers:ro
      - type: bind
        source: ./.docker/downloaded/keycloak-interface.openapi.yaml
        target: /opt/keycloak/keycloak-interface.openapi.yaml
        read_only: true
        bind:
          # Prevent Docker from auto-creating a directory if the file is missing.
          create_host_path: false
    depends_on:
      download-core-tools:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-storage:
    image: ghcr.io/adorsys-gis/user-storage:masterdd94de130f78273eafcc2e6250a5cee8851d54e2
    container_name: user-storage
    restart: unless-stopped
    command:
      - serve
      - --config-path
      - config/dev.yaml
      - --mode
      - server
    volumes:
      - ./config:/app/config/
      - ./flows:/app/flows/
      - ./sessions:/app/sessions/
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-dev}"
      RUST_LOG: debug
      SMS_SINK_URL: "http://sms-gateway:3000"
      CUSS_URL: "http://cuss-wiremock:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      sms-gateway:
        condition: service_healthy
      cuss-wiremock:
        condition: service_healthy

  sms-gateway:
    image: ghcr.io/adorsys-gis/sms-gateway:master76dac53a82ae9482fd4fadba2ef4fba660aae5c3
    container_name: sms-gateway
    restart: unless-stopped
    command:
      - --config
      - config/dev.yaml
    volumes:
      - ./config:/app/config/
    ports:
      - "8081:3000"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-dev}"
      RUST_LOG: debug
    depends_on:
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  frontend-mobile:
    image: ghcr.io/skyengpro/azamra-tokenization-frontend-mobile:develop-amd
    container_name: azamra-frontend-mobile
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      EXPO_PUBLIC_FORCE_TRADING: "true"
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - ./config/frontend-mobile-config.json:/usr/share/nginx/html/config.json:ro
    depends_on:
      bff:
        condition: service_started
      keycloak:
        condition: service_healthy

  frontend-kyc-mgr:
    image: ghcr.io/skyengpro/azamra-tokenization-frontend-kyc-mgr:sha-221e90e-amd
    container_name: azamra-frontend-kyc-mgr
    restart: unless-stopped
    ports:
      - "8085:3000"
    environment:
      OAUTH2_ISSUER: http://localhost:9026/realms/e2e-testing
      OAUTH2_INTERNAL_ISSUER: http://keycloak:9026/realms/e2e-testing
      OAUTH2_CLIENT_ID: kyc-client
      OAUTH2_CLIENT_SECRET: some-secret
      OAUTH2_SCOPES: openid profile email
      OAUTH2_PROVIDER_ID: keycloak
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: kyc-mgr
      AUTH_SESSION_TTL_SECONDS: 86400
      AUTH_REFRESH_SKEW_SECONDS: 60
      API_URL: http://user-storage:3000/staff
      KYC_SESSION_TYPES: kyc_fineract
      NODE_ENV: development
      SKIP_ENV_VALIDATION: true
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      bff:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        /app/config/kyc-mgr-patch.sh
        npm run start
    volumes:
      - ./config:/app/config:ro

  bff:
    image: ghcr.io/skyengpro/azamra-tokenization-bff:sha-dca828a9b9ff-amd
    container_name: azamra-bff
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_APPLICATION_NAME: azamra-tokenization-bff
      SPRING_CACHE_TYPE: redis
      SPRING_CACHE_REDIS_TIME_TO_LIVE: 10m
      SPRING_CACHE_REDIS_CACHE_NULL_VALUES: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      LOGGING_LEVEL_ROOT: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: DEBUG
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:9026/realms/e2e-testing
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:9026/realms/e2e-testing/protocol/openid-connect/certs
      APP_SECURITY_SIGNATURE_MAX_CLOCK_SKEW_SECONDS: "60"
      APP_OAUTH2_CLIENT_ID: web-mobile
      APP_OAUTH2_TOKEN_ENDPOINT_URL: http://keycloak:9026/realms/e2e-testing/protocol/openid-connect/token
      APP_ASSET_SERVICE_BASE_URL: http://cuss-wiremock:8080/api
      APP_CUSS_BASE_URL: http://cuss-wiremock:8080
      APP_USER_STORAGE_BASE_URL: http://user-storage:3000/bff
      APP_PAYMENT_GATEWAY_BASE_URL: http://cuss-wiremock:8080
      APP_KYC_FIRST_DEPOSIT_AMOUNT: "15000"
      APP_KYC_FIRST_DEPOSIT_CURRENCY: XAF
      APP_AZAMRA_FRONTEND_SERVER_API_BASE_PATH: "/api/v1/api"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      SERVER_PORT: "8082"
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      user-storage:
        condition: service_started
      cuss-wiremock:
        condition: service_started
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: fineract-net
    driver: bridge
