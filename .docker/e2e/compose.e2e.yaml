include:
  - ../../deploy/compose/tools.compose.yml
  - ../../deploy/compose/postgres.compose.yml
  - ../../deploy/compose/redis.compose.yml
  - ../../deploy/compose/minio.compose.yml
  - ../../deploy/compose/keycloak.compose.yml

services:
  minio-create-bucket:
    environment:
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"

  user-storage-server:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    command:
      - serve
      - --config-path
      - config/e2e.yaml
      - --mode
      - server
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    ports:
      - '3002:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      cuss-stub:
        condition: service_healthy
      sms-sink:
        condition: service_healthy
      sms-gateway:
        condition: service_started

  user-storage-server-blank-base:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    command:
      - serve
      - --config-path
      - config/e2e.blank-bff-path.yaml
      - --mode
      - server
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    ports:
      - '3003:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      cuss-stub:
        condition: service_healthy
      sms-sink:
        condition: service_healthy
      sms-gateway:
        condition: service_started

  user-storage-server-auth-disabled:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    command:
      - serve
      - --config-path
      - config/e2e.auth-disabled.yaml
      - --mode
      - server
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    ports:
      - '3004:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      cuss-stub:
        condition: service_healthy
      sms-sink:
        condition: service_healthy
      sms-gateway:
        condition: service_started

  user-storage-worker:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    command:
      - serve
      - --config-path
      - config/e2e.yaml
      - --mode
      - worker
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    ports:
      - '3005:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      cuss-stub:
        condition: service_healthy
      sms-sink:
        condition: service_healthy
      sms-gateway:
        condition: service_started

  user-storage-worker-secondary:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    command:
      - serve
      - --config-path
      - config/e2e.yaml
      - --mode
      - worker
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    ports:
      - '3006:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      cuss-stub:
        condition: service_healthy
      sms-sink:
        condition: service_healthy
      sms-gateway:
        condition: service_started

  sms-gateway:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
    entrypoint:
      - /app/sms-gateway
    command:
      - --config
      - config/e2e.yaml
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
      REDIS_URL: "redis://redis:6379"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_REGION: "us-east-1"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-e2e}"
      SMS_SINK_URL: "http://sms-sink:8081"
      CUSS_URL: "http://cuss-stub:8080"
      MINIO_FORCE_PATH_STYLE: "true"
      RUST_LOG: info
    volumes:
      - ../../config:/app/config
    depends_on:
      redis:
        condition: service_healthy
      sms-sink:
        condition: service_healthy

  cuss-stub:
    build:
      context: ../../.docker/e2e/stubs/cuss
      dockerfile: Dockerfile
    ports:
      - '18080:8080'
    restart: 'on-failure'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/__admin/requests >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      keycloak:
        condition: service_healthy

  sms-sink:
    build:
      context: ../../.docker/e2e/stubs/sms-sink
      dockerfile: Dockerfile
    ports:
      - '18081:8081'
    restart: 'no'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/__admin/messages >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
