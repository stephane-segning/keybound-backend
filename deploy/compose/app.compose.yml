x-env: &env
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
  REDIS_URL: "redis://redis:6379"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_REGION: "us-east-1"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
  MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-dev}"
  RUST_LOG: debug
  SMS_SINK_URL: "http://sms-gateway:3000"
  CUSS_URL: "http://cuss-wiremock:8080"

services:
  app:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    command:
    - serve
    - --config-path
    - config/dev.yaml
    - --mode
    - server
    volumes:
    - ../../config:/app/config/
    - ../../flows:/app/flows/
    - ../../sessions:/app/sessions/
    ports:
    - "3001:3000"
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      sms-gateway:
        condition: service_healthy
      cuss-wiremock:
        condition: service_started

  app-worker:
    image: user-storage-app
    restart: on-failure
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    command:
    - serve
    - --config-path
    - config/dev.yaml
    - --mode
    - worker
    volumes:
    - ../../config:/app/config/
    - ../../flows:/app/flows/
    - ../../sessions:/app/sessions/
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      sms-gateway:
        condition: service_healthy
      cuss-wiremock:
        condition: service_started

  sms-gateway:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    restart: unless-stopped
    entrypoint:
      - /app/sms-gateway
    command:
      - --config
      - config/dev.yaml
    volumes:
      - ../../config:/app/config/
    environment:
      <<: *env
    depends_on:
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  cuss-wiremock:
    image: wiremock/wiremock:3.13.1
    command:
      - --disable-banner
      - --verbose
      - --global-response-templating
    volumes:
      - ../../.docker/wiremock/cuss/mappings:/home/wiremock/mappings:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/__admin/mappings >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 20
