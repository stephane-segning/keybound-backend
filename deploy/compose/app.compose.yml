x-env: &env
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user-storage"
  REDIS_URL: "redis://redis:6379"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_REGION: "us-east-1"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
  MINIO_BUCKET: "${MINIO_BUCKET:-user-storage-dev}"
  RUST_LOG: debug

services:
  app:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    command:
    - serve
    - --config-path
    - config/dev.yaml
    - --mode
    - server
    volumes:
    - ../../config:/app/config/
    - ../../flows:/app/flows/
    - ../../sessions:/app/sessions/
    ports:
    - "3001:3000"
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully

  app-worker:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    command:
    - serve
    - --config-path
    - config/dev.yaml
    - --mode
    - worker
    volumes:
    - ../../config:/app/config/
    - ../../flows:/app/flows/
    - ../../sessions:/app/sessions/
    environment:
      <<: *env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully

  sms-gateway:
    image: user-storage-app
    build:
      context: ../..
      dockerfile: deploy/docker/user-storage/Dockerfile
      target: dev
    restart: unless-stopped
    entrypoint:
      - /app/sms-gateway
    command:
      - --config
      - config/dev.yaml
    volumes:
      - ../../config:/app/config/
    environment:
      <<: *env
    depends_on:
      redis:
        condition: service_healthy
