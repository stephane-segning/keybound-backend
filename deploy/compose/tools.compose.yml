services:
  download-core-tools:
    image: alpine/curl
    environment:
      KEYCLOAK_PLUGIN_VERSION: "0.2.0"
      OPENAPI_GENERATOR_VERSION: "7.19.0"
    command:
    - /bin/sh
    - -c
    - |
      set -e;
      rm -rf /data/*
      mkdir -p /data/bin
      mkdir -p /data/kc-plugins

      echo "Download OpenAPI generator (we're using it to generate code from OpenAPI specs...";
      curl -sLo /data/bin/openapi-generator-cli.jar "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/$$OPENAPI_GENERATOR_VERSION/openapi-generator-cli-$$OPENAPI_GENERATOR_VERSION.jar"

      echo "Download OpenAPI for Keycloak...";
      curl -sLo /data/keycloak-interface.openapi.yaml "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/backend.open-api.yml"
      echo "Downloaded OpenAPI for Keycloak";

      echo "Download keybound...";
      curl -sLo /data/kc-plugins/keycloak-keybound-all.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-all-$$KEYCLOAK_PLUGIN_VERSION-all.jar"
      curl -sLo /data/kc-plugins/keycloak-keybound-api-gateway-http.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-api-gateway-http-$$KEYCLOAK_PLUGIN_VERSION.jar"
      curl -sLo /data/kc-plugins/keycloak-keybound-custom-endpoint.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-custom-endpoint-$$KEYCLOAK_PLUGIN_VERSION.jar"
      curl -sLo /data/kc-plugins/keycloak-keybound-grant-device-key.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-grant-device-key-$$KEYCLOAK_PLUGIN_VERSION.jar"
      curl -sLo /data/kc-plugins/keycloak-keybound-user-storage-backend.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-user-storage-backend-$$KEYCLOAK_PLUGIN_VERSION.jar"
      echo "Downloaded keybound";

    volumes:
    - downloaded_data:/data

  generate-code:
    image: amazoncorretto:21
    user: root
    environment:
      USER_ID: "${USER_ID:-1000}"
      GROUP_ID: "${GROUP_ID:-1000}"
    depends_on:
      download-core-tools:
        condition: service_completed_successfully
    configs:
    - source: oas_server_kc
      target: /tmp/oas_server_kc.json
      mode: 444
    - source: oas_server_bff
      target: /tmp/oas_server_bff.json
      mode: 444
    - source: oas_server_staff
      target: /tmp/oas_server_staff.json
      mode: 444
    - source: oas_server_cuss
      target: /tmp/oas_server_cuss.json
      mode: 444
    volumes:
    - downloaded_data:/data
    - ../../app/gen:/work
    - ../../openapi:/openapi
    command:
    - /bin/sh
    - -c
    - |
      set -e;

      JAR_FILE=/data/bin/openapi-generator-cli.jar

      for item in oas_server_kc oas_server_cuss oas_server_staff oas_server_bff; do
          echo "Generating $$item..."
          
          # Generate to a local container directory first to avoid bind mount issues
          TMP_DIR="/tmp/gen_$$item"
          rm -rf "$$TMP_DIR"
          mkdir -p "$$TMP_DIR"
          
          java -jar "$$JAR_FILE" generate \
            -c "/tmp/$$item.json" \
            -o "$$TMP_DIR" \
            --skip-validate-spec
          
          # Now move to the bind mount
          echo "Moving $$item to /work..."
          rm -rf "/work/$$item"
          mkdir -p "/work/$$item"
          cp -a "$$TMP_DIR"/. "/work/$$item/"
          rm -rf "$$TMP_DIR"
      done

      echo "Fixing permissions for $$USER_ID:$$GROUP_ID..."
      chown -R "$$USER_ID:$$GROUP_ID" /work

volumes:
  downloaded_data:


configs:
  oas_server_kc:
    content: |
      {
        "inputSpec": "/data/keycloak-interface.openapi.yaml",
        "generatorName": "rust-axum",
        "packageName": "gen_oas_server_kc",
        "packageVersion": "9.9.9"
      }
  oas_server_cuss:
    content: |
      {
        "inputSpec": "/openapi/user-storage--cuss.yaml",
        "generatorName": "rust-axum",
        "packageName": "gen_oas_server_cuss",
        "packageVersion": "9.9.9"
      }
  oas_server_staff:
    content: |
      {
        "inputSpec": "/openapi/user-storage--staff.yaml",
        "generatorName": "rust-axum",
        "packageName": "gen_oas_server_staff",
        "packageVersion": "9.9.9"
      }
  oas_server_bff:
    content: |
      {
        "inputSpec": "/openapi/user-storage-bff.yaml",
        "generatorName": "rust-axum",
        "packageName": "gen_oas_server_bff",
        "packageVersion": "9.9.9"
      }
