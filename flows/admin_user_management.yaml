flow_type: admin_user_management
human_id_prefix: aum
feature: flow-admin-user-management
initial_step: review

steps:
  review:
    action: WAIT
    actor: ADMIN
    config: {}
    retry:
      max: 3
      delay_ms: 5000
    ok: apply
    fail: error

  apply:
    action: SET
    actor: SYSTEM
    config:
      to: user
      values:
        admin_action_applied: true
    retry:
      max: 3
      delay_ms: 500
    ok: complete
    fail: error

  error:
    action: ERROR
    actor: SYSTEM
    config:
      message: "User management action failed"
      retryable: false
    retry:
      max: 1
      delay_ms: 0

  complete:
    action: NOOP
    actor: SYSTEM
    retry:
      max: 1
      delay_ms: 0