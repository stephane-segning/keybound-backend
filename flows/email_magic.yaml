flow_type: email_magic
human_id_prefix: em
feature: flow-email-magic
initial_step: issue

steps:
  issue:
    action: GENERATE_OTP
    actor: SYSTEM
    config:
      length: 8
      expires_in_seconds: 600
      channel: email
    retry:
      max: 3
      delay_ms: 1000
    next: send

  send:
    action: WEBHOOK
    actor: SYSTEM
    config:
      url: "${NOTIFICATION_SERVICE_URL}/send-magic-email"
      method: POST
      timeout_ms: 5000
      success_codes: [200, 201]
    retry:
      max: 5
      delay_ms: 2000
    ok: verify
    fail: error

  verify:
    action: VERIFY_OTP
    actor: END_USER
    config:
      max_attempts: 5
    retry:
      max: 5
      delay_ms: 1000
    ok: complete
    fail: issue

  error:
    action: ERROR
    actor: SYSTEM
    config:
      message: "Failed to send magic email"
      retryable: false
    retry:
      max: 1
      delay_ms: 0

  complete:
    action: NOOP
    actor: SYSTEM
    retry:
      max: 1
      delay_ms: 0