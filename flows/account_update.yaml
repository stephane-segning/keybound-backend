flow_type: account_update
human_id_prefix: au
feature: flow-account-update
initial_step: submit

steps:
  submit:
    action: WAIT
    actor: END_USER
    config: {}
    retry:
      max: 3
      delay_ms: 1000
    ok: apply
    fail: error

  apply:
    action: SET
    actor: SYSTEM
    config:
      to: user
      values:
        account_updated: true
    retry:
      max: 3
      delay_ms: 500
    ok: complete
    fail: error

  error:
    action: ERROR
    actor: SYSTEM
    config:
      message: "Account update failed"
      retryable: false
    retry:
      max: 1
      delay_ms: 0

  complete:
    action: NOOP
    actor: SYSTEM
    retry:
      max: 1
      delay_ms: 0