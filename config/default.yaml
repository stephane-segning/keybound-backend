server:
  address: "0.0.0.0"
  port: 3000
  tls:
    enabled: false
    port: 3443
    cert_path: "./config/tls/api.crt"
    key_path: "./config/tls/api.key"

logging:
  level: "info"
  log_requests_enabled: false

database:
  url: "postgres://postgres:postgres@localhost:5432/user-storage"
  pool_size: 10

runtime:
  mode: shared

redis:
  url: "redis://127.0.0.1:6379"

storage:
  type: minio
  minio:
    endpoint: ${MINIO_ENDPOINT:-http://127.0.0.1:9000}
    region: ${MINIO_REGION:-us-east-1}
    access_key: ${MINIO_ACCESS_KEY:-minioadmin}
    secret_key: ${MINIO_SECRET_KEY:-minioadmin}
    bucket: ${MINIO_BUCKET:-user-storage-dev}
    force_path_style: true
    presign_ttl_seconds: 900

s3:
  region: "us-east-1"
  bucket: "user-storage-dev"
  force_path_style: true
  endpoint: null
  presign_ttl_seconds: 900

sns:
  region: "us-east-1"
  max_attempts: 10
  initial_backoff_seconds: 5

sms:
  provider: console # options are 'console' (default) or 'sns'

oauth2:
  issuer: "http://localhost:9026/realms/e2e-testing"
  base-paths: []

kc:
  enabled: true
  base-path: /kc
  signature_secret: "change-me"
  max_clock_skew_seconds: 60
  max_body_bytes: 262144

bff:
  enabled: true
  base-path: /bff

staff:
  enabled: true
  base-path: /staff

deposit_flow:
  staff:
    recipients:
      - provider: MTN_CM
        fullname: "Mbarga Benn"
        phone-number: "+237690000111"
        regex: "^\\+23769[0-4][0-9]{6}$"
        currency: XAF
      - provider: ORANGE_CM
        fullname: "Nkoumou Linda"
        phone-number: "+237699000222"
        regex: "^\\+23769[5-9][0-9]{6}$"
        currency: XAF

cuss:
  api_url: http://cuss:8080
