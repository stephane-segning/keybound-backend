name: Main CI

on:
  push:
  pull_request:

env:
  CARGO_TARGET_DIR: target

jobs:
  test-workspace:
    name: Tests (Workspace) 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        name: Setup rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-tests-${{ runner.os }}-workspace
          cache-on-failure: true
      - name: Run cargo test (workspace)
        id: run_tests
        run: |
          start_ts="$(date +%s)"
          cargo test --workspace --locked
          end_ts="$(date +%s)"
          echo "duration_seconds=$((end_ts - start_ts))" >> "$GITHUB_OUTPUT"
      - name: Test report
        if: always()
        run: |
          {
            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "### 🧪 Tests Report: Workspace"
            echo "- Command: cargo test --workspace --locked"
            echo "- Outcome: **${{ steps.run_tests.outcome }}**"
            echo "- Duration: ${{ steps.run_tests.outputs.duration_seconds }}s"
            echo "- Timestamp: ${timestamp} UTC"
            echo "- Run ID: #${GITHUB_RUN_NUMBER} (job ${{ github.job }})"
          } >> "$GITHUB_STEP_SUMMARY"

  test-oas:
    name: Tests (OAS Integration) 🔍
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        name: Setup rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-tests-${{ runner.os }}-oas
          cache-on-failure: true
      - name: Run OAS integration tests
        id: run_tests
        run: |
          start_ts="$(date +%s)"
          cargo test -p backend-server --features it-tests api::it_tests:: --locked
          end_ts="$(date +%s)"
          echo "duration_seconds=$((end_ts - start_ts))" >> "$GITHUB_OUTPUT"
      - name: Test report
        if: always()
        run: |
          {
            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "### 🔍 Tests Report: OAS Integration"
            echo "- Command: cargo test -p backend-server --features it-tests api::it_tests:: --locked"
            echo "- Outcome: **${{ steps.run_tests.outcome }}**"
            echo "- Duration: ${{ steps.run_tests.outputs.duration_seconds }}s"
            echo "- Timestamp: ${timestamp} UTC"
            echo "- Run ID: #${GITHUB_RUN_NUMBER} (job ${{ github.job }})"
          } >> "$GITHUB_STEP_SUMMARY"

  cargo-version:
    name: Cargo Version Detector 🚩
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.change.outputs.changed }}
      version: ${{ steps.workspace_version.outputs.current_version }}
      latest_tag: ${{ steps.latest.outputs.latest_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --prune
      - name: Determine latest release/tag
        id: latest
        run: |
          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || echo "none")"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
      - name: Determine workspace version
        id: workspace_version
        run: |
          current_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_workspace_package=1; next }
              in_workspace_package && /^\[/ { in_workspace_package=0 }
              in_workspace_package && $1 == "version" {
                gsub(/"/, "", $3)
                print $3
                exit
              }
            ' Cargo.toml
          )"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
      - name: Detect delta vs latest release
        id: change
        run: |
          latest="${{ steps.latest.outputs.latest_tag }}"
          current="${{ steps.workspace_version.outputs.current_version }}"
          latest_stripped="${latest#v}"
          changed="true"
          if [ "$latest" != "none" ]; then
            if [ "$current" = "$latest_stripped" ]; then
              changed="false"
            fi
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
      - name: Version report
        run: |
          {
            latest_tag="${{ steps.latest.outputs.latest_tag }}"
            if [ -z "${latest_tag}" ]; then
              latest_tag="none"
            fi
            echo "### 🚩 Cargo Version Report"
            echo "- Latest release/tag: ${latest_tag}"
            echo "- Workspace version: ${{ steps.workspace_version.outputs.current_version }}"
            echo "- New release required: **${{ steps.change.outputs.changed }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  build-musl:
    name: Build MUSL (${{ matrix.arch }}) ⚙️
    needs:
      - test-workspace
      - test-oas
    runs-on: ${{ matrix.runner }}
    env:
      MUSL_TARGET: ${{ matrix.rust_target }}
      MUSL_ARCH: ${{ matrix.arch }}
      MUSL_RUNNER: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            rust_target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            rust_target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        name: Setup rust
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-musl-${{ runner.os }}-${{ matrix.rust_target }}
          cache-on-failure: true
      - name: Install MUSL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            clang \
            llvm-dev \
            musl-dev \
            musl-tools \
            pkg-config \
            perl \
            protobuf-compiler
      - name: Add rust target
        run: rustup target add "${MUSL_TARGET}"
      - name: Configure MUSL linker env
        run: |
          if [ "${MUSL_TARGET}" = "x86_64-unknown-linux-musl" ]; then
            cc_bin="musl-gcc"
            cxx_bin="g++"
            ar_bin="ar"
            if command -v x86_64-linux-musl-g++ >/dev/null 2>&1; then
              cxx_bin="x86_64-linux-musl-g++"
            fi
            if command -v x86_64-linux-musl-ar >/dev/null 2>&1; then
              ar_bin="x86_64-linux-musl-ar"
            fi
            musl_libdir="/usr/lib/x86_64-linux-musl"
            rustflags="-Clink-arg=-lm -Clink-arg=-lgcc_eh"
            if [ -d "${musl_libdir}" ]; then
              rustflags="-Lnative=${musl_libdir} ${rustflags}"
            fi
            echo "CC_x86_64_unknown_linux_musl=${cc_bin}" >> "$GITHUB_ENV"
            echo "CXX_x86_64_unknown_linux_musl=${cxx_bin}" >> "$GITHUB_ENV"
            echo "AR_x86_64_unknown_linux_musl=${ar_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=${cc_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_AR=${ar_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=${rustflags}" >> "$GITHUB_ENV"
            echo "SELECTED_MUSL_LIBDIR=${musl_libdir}" >> "$GITHUB_ENV"
            echo "SELECTED_MUSL_LINKER=${cc_bin}" >> "$GITHUB_ENV"
          elif [ "${MUSL_TARGET}" = "aarch64-unknown-linux-musl" ]; then
            cc_bin="musl-gcc"
            ar_bin="ar"
            if command -v aarch64-linux-musl-gcc >/dev/null 2>&1; then
              cc_bin="aarch64-linux-musl-gcc"
            fi
            if command -v aarch64-linux-musl-ar >/dev/null 2>&1; then
              ar_bin="aarch64-linux-musl-ar"
            fi
            musl_libdir="/usr/lib/aarch64-linux-musl"
            rustflags="-Clink-arg=-lm -Clink-arg=-lgcc_eh"
            if [ -d "${musl_libdir}" ]; then
              rustflags="-Lnative=${musl_libdir} ${rustflags}"
            fi
            echo "CC_aarch64_unknown_linux_musl=${cc_bin}" >> "$GITHUB_ENV"
            echo "AR_aarch64_unknown_linux_musl=${ar_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=${cc_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_AR=${ar_bin}" >> "$GITHUB_ENV"
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=${rustflags}" >> "$GITHUB_ENV"
            echo "SELECTED_MUSL_LIBDIR=${musl_libdir}" >> "$GITHUB_ENV"
            echo "SELECTED_MUSL_LINKER=${cc_bin}" >> "$GITHUB_ENV"
          fi
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
      - name: Verify MUSL toolchain
        run: |
          command -v musl-gcc || true
          command -v x86_64-linux-musl-gcc || true
          command -v aarch64-linux-musl-gcc || true
          echo "selected linker: ${SELECTED_MUSL_LINKER:-unset}"
          echo "selected musl libdir: ${SELECTED_MUSL_LIBDIR:-unset}"
      - name: Build backend + health (MUSL)
        id: build
        run: |
          set -euo pipefail
          start_ts="$(date +%s)"
          set +e
          cargo build --release --locked --target "${MUSL_TARGET}" -p backend
          build_rc=$?
          set -e
          if [ "${build_rc}" -eq 0 ]; then
            mkdir -p dist
            cp "target/${MUSL_TARGET}/release/backend" dist/backend
            cp "target/${MUSL_TARGET}/release/health" dist/healthcheck
            chmod +x dist/backend dist/healthcheck
          fi
          end_ts="$(date +%s)"
          echo "duration_seconds=$((end_ts - start_ts))" >> "$GITHUB_OUTPUT"
          exit "${build_rc}"
      - name: Collect binary size metadata
        id: sizes
        if: always()
        run: |
          backend_bytes="n/a"
          health_bytes="n/a"
          total_bytes="n/a"
          if [ -f dist/backend ] && [ -f dist/healthcheck ]; then
            backend_bytes="$(stat -c%s dist/backend)"
            health_bytes="$(stat -c%s dist/healthcheck)"
            total_bytes="$((backend_bytes + health_bytes))"
          fi
          echo "backend_bytes=${backend_bytes}" >> "$GITHUB_OUTPUT"
          echo "health_bytes=${health_bytes}" >> "$GITHUB_OUTPUT"
          echo "total_bytes=${total_bytes}" >> "$GITHUB_OUTPUT"
      - name: Upload MUSL binaries
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: musl-binaries-${{ matrix.arch }}
          path: dist/
      - name: Build report
        if: always()
        run: |
          {
            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            duration="${{ steps.build.outputs.duration_seconds }}"
            if [ -z "${duration}" ]; then
              duration="n/a"
            fi
            echo "### ⚙️ MUSL Build Report (${{ matrix.arch }})"
            echo "- Target: ${MUSL_TARGET}"
            echo "- Runner: ${MUSL_RUNNER} (arch ${MUSL_ARCH})"
            echo "- Linker: ${SELECTED_MUSL_LINKER:-n/a}"
            echo "- Result: **${{ steps.build.outcome }}**"
            echo "- Duration: ${duration}s"
            echo "- Backend size: ${{ steps.sizes.outputs.backend_bytes }} bytes"
            echo "- Healthcheck size: ${{ steps.sizes.outputs.health_bytes }} bytes"
            echo "- Total MUSL payload: ${{ steps.sizes.outputs.total_bytes }} bytes"
            echo "- Timestamp: ${timestamp} UTC"
          } >> "$GITHUB_STEP_SUMMARY"

  container-build-dev-arch:
    name: Container Build Dev (${{ matrix.arch }}) 🐳
    permissions:
      contents: read
      packages: write
    needs:
      - build-musl
      - test-workspace
      - test-oas
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-docker
        id: setup
        with:
          app-version: dev-${{ github.sha }}
          image-name: ${{ github.repository }}
      - uses: actions/download-artifact@v5
        with:
          name: musl-binaries-${{ matrix.arch }}
          path: image_ctx
      - name: Prepare image context
        run: |
          chmod +x image_ctx/backend image_ctx/healthcheck
          cp deploy/docker/user-storage/Dockerfile.runtime image_ctx/Dockerfile
      - name: Set image tag
        id: image
        run: |
          tag="ghcr.io/${{ github.repository_owner }}/user-storage:dev-${{ github.sha }}-${{ matrix.arch }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Build and push dev image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: image_ctx
          file: image_ctx/Dockerfile
          push: true
          no-cache: false
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.image.outputs.tag }}
      - name: Collect image metadata
        id: image_meta
        run: |
          inspect_output="$(docker buildx imagetools inspect "${{ steps.image.outputs.tag }}")"
          printf '%s\n' "$inspect_output"
          size_line="$(printf '%s\n' "$inspect_output" | awk '/^  Size:/ { print $2; exit }')"
          echo "size=${size_line:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Image report
        if: always()
        run: |
          {
            echo "### 🐳 Container Report: Dev (${{ matrix.arch }})"
            echo "- Platform: ${{ matrix.platform }}"
            echo "- Tag: ${{ steps.image.outputs.tag }}"
            echo "- Digest: ${{ steps.build_image.outputs.digest }}"
            echo "- Manifest size (imagetools): ${{ steps.image_meta.outputs.size }}"
            echo "- Source artifact: musl-binaries-${{ matrix.arch }}"
          } >> "$GITHUB_STEP_SUMMARY"

  container-build-dev-manifest:
    name: Container Build Dev (Manifest) 📦
    permissions:
      contents: read
      packages: write
    needs:
      - container-build-dev-arch
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-docker
        id: setup
        with:
          app-version: dev-${{ github.sha }}
          image-name: ${{ github.repository }}
      - name: Create and push multi-arch manifest
        id: manifest
        run: |
          base_tag="ghcr.io/${{ github.repository_owner }}/user-storage:dev-${{ github.sha }}"
          docker buildx imagetools create \
            -t "${base_tag}" \
            "${base_tag}-amd64" \
            "${base_tag}-arm64"
          inspect_output="$(docker buildx imagetools inspect "${base_tag}")"
          printf '%s\n' "$inspect_output"
          total_sizes="$(printf '%s\n' "$inspect_output" | awk '/^  Size:/ { print $2 }' | paste -sd ', ' -)"
          echo "tag=${base_tag}" >> "$GITHUB_OUTPUT"
          echo "sizes=${total_sizes:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Manifest report
        if: always()
        run: |
          {
            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "### 📦 Container Report: Dev Manifest"
            echo "- Tag: ${{ steps.manifest.outputs.tag }}"
            echo "- Source slices: ${{ steps.manifest.outputs.tag }}-amd64, ${{ steps.manifest.outputs.tag }}-arm64"
            echo "- Per-arch manifest sizes: ${{ steps.manifest.outputs.sizes }}"
            echo "- Timestamp: ${timestamp} UTC"
          } >> "$GITHUB_STEP_SUMMARY"

  container-build-prod-prepare:
    name: Container Build Prod (Prepare Tags) 📋
    permissions:
      contents: read
      packages: write
    needs:
      - cargo-version
      - build-musl
      - test-workspace
      - test-oas
    if: github.ref == 'refs/heads/master' && needs.cargo-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.setup.outputs.tags }}
      version: ${{ needs.cargo-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-docker
        id: setup
        with:
          app-version: ${{ needs.cargo-version.outputs.version }}
          image-name: ${{ github.repository }}
      - name: Tags report
        run: |
          {
            echo "### Container Report: Prod Tags"
            echo "- Workspace version: ${{ needs.cargo-version.outputs.version }}"
            echo "- Latest release/tag detected: ${{ needs.cargo-version.outputs.latest_tag }}"
            echo "- New release required: **${{ needs.cargo-version.outputs.changed }}**"
            echo "- Tags:"
            while IFS= read -r tag; do
              [ -n "$tag" ] && echo "  - ${tag}"
            done <<< "${{ steps.setup.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"

  container-build-prod-arch:
    name: Container Build Prod (${{ matrix.arch }}) 🐧
    permissions:
      contents: read
      packages: write
    needs:
      - container-build-prod-prepare
      - build-musl
    if: needs.container-build-prod-prepare.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-docker
        id: setup
        with:
          app-version: ${{ needs.container-build-prod-prepare.outputs.version }}
          image-name: ${{ github.repository }}
      - uses: actions/download-artifact@v5
        with:
          name: musl-binaries-${{ matrix.arch }}
          path: image_ctx
      - name: Prepare image context
        run: |
          chmod +x image_ctx/backend image_ctx/healthcheck
          cp deploy/docker/user-storage/Dockerfile.runtime image_ctx/Dockerfile
      - name: Derive architecture tags
        id: tags
        run: |
          first_tag=""
          {
            echo "arch_tags<<EOF"
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              arch_tag="${tag}-${{ matrix.arch }}"
              [ -z "$first_tag" ] && first_tag="$arch_tag"
              echo "$arch_tag"
            done <<< "${{ needs.container-build-prod-prepare.outputs.tags }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "first_tag=${first_tag}" >> "$GITHUB_OUTPUT"
      - name: Build and push prod image
        id: build_image
        uses: docker/build-push-action@v6
        with:
          context: image_ctx
          file: image_ctx/Dockerfile
          push: true
          no-cache: true
          platforms: ${{ matrix.platform }}
          tags: ${{ steps.tags.outputs.arch_tags }}
          provenance: true
          sbom: true
      - name: Collect image metadata
        id: image_meta
        run: |
          inspect_output="$(docker buildx imagetools inspect "${{ steps.tags.outputs.first_tag }}")"
          printf '%s\n' "$inspect_output"
          size_line="$(printf '%s\n' "$inspect_output" | awk '/^  Size:/ { print $2; exit }')"
          echo "size=${size_line:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Image report
        if: always()
        run: |
          {
            echo "### 🐧 Container Report: Prod (${{ matrix.arch }})"
            echo "- Platform: ${{ matrix.platform }}"
            echo "- Example tag: ${{ steps.tags.outputs.first_tag }}"
            echo "- Digest: ${{ steps.build_image.outputs.digest }}"
            echo "- Manifest size (imagetools): ${{ steps.image_meta.outputs.size }}"
            echo "- Source artifact: musl-binaries-${{ matrix.arch }}"
          } >> "$GITHUB_STEP_SUMMARY"

  container-build-prod-manifest:
    name: Container Build Prod (Manifest) 🚀
    permissions:
      contents: read
      packages: write
    needs:
      - container-build-prod-prepare
      - container-build-prod-arch
    if: needs.container-build-prod-prepare.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-docker
        id: setup
        with:
          app-version: ${{ needs.container-build-prod-prepare.outputs.version }}
          image-name: ${{ github.repository }}
      - name: Create and push multi-arch manifests
        id: manifests
        run: |
          first_tag=""
          first_sizes=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            [ -z "$first_tag" ] && first_tag="$tag"
            docker buildx imagetools create \
              -t "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
            inspect_output="$(docker buildx imagetools inspect "$tag")"
            printf '%s\n' "$inspect_output"
            sizes="$(printf '%s\n' "$inspect_output" | awk '/^  Size:/ { print $2 }' | paste -sd ', ' -)"
            if [ -z "$first_sizes" ]; then
              first_sizes="${sizes:-unknown}"
            fi
          done <<< "${{ needs.container-build-prod-prepare.outputs.tags }}"
          echo "first_tag=${first_tag}" >> "$GITHUB_OUTPUT"
          echo "first_sizes=${first_sizes}" >> "$GITHUB_OUTPUT"
      - name: Manifest report
        if: always()
        run: |
          {
            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "### 🚀 Container Report: Prod Manifest"
            echo "- Example tag: ${{ steps.manifests.outputs.first_tag }}"
            echo "- Per-arch manifest sizes: ${{ steps.manifests.outputs.first_sizes }}"
            echo "- Source tags: ${{ needs.container-build-prod-prepare.outputs.tags }}"
            echo "- Timestamp: ${timestamp} UTC"
          } >> "$GITHUB_STEP_SUMMARY"
