name: Login to GHCR
description: Composite action that logs into GitHub Container Registry using the default workflow token.
runs:
  using: composite
  steps:
    - name: Authenticate to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
