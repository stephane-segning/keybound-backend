name: Setup Rust Toolchain
description: |
  Composite action to install the requested Rust toolchain and cache cargo downloads for workspace builds.
inputs:
  rust-version:
    description: Rust version to install.
    required: false
    default: 'stable'
runs:
  using: composite
  steps:
    - name: Setup just
      uses: extractions/setup-just@v3

    - name: Install rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-version }}

    - name: Prime cargo registry cache
      shell: bash
      run: cargo fetch
