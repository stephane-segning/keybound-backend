name: Setup Rust Toolchain
description: |
  Composite action to install the requested Rust toolchain and cache cargo downloads for workspace builds.
inputs:
  rust-version:
    description: Rust version to install.
    required: false
    default: '1'
runs:
  using: composite
  steps:
    - name: Install rust toolchain
      uses: actions/setup-rust@v1
      with:
        rust-version: ${{ inputs.rust-version }}
        cache: cargo
    - name: Prime cargo registry cache
      shell: bash
      run: cargo fetch
